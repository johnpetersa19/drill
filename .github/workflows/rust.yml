name: Rust (Arch)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: false
  CARGO_NET_RETRY: 5
  CARGO_HTTP_TIMEOUT: 120

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base

    steps:
    - uses: actions/checkout@v4

    - name: Update system and install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm --needed \
          base-devel \
          git \
          meson \
          ninja \
          pkgconf \
          gtk4 \
          libadwaita \
          glib2 \
          libgit2 \
          blueprint-compiler \
          appstream \
          desktop-file-utils \
          gettext \
          libxml2 \
          rustup \
          cargo

    - name: Initialize Rust toolchain
      run: |
        rustup toolchain install stable
        rustup default stable
        rustc --version
        cargo --version

    - name: Check GLib via pkg-config
      run: |
        echo "Default pc_path:"
        pkgconf --variable pc_path pkg-config || true
        echo "glib-2.0 version:"
        pkgconf --modversion glib-2.0
        echo "glib-2.0 flags:"
        pkgconf --cflags --libs glib-2.0

    - name: Lint Blueprint (.blp) files
      run: |
        echo "=== blueprint-compiler version ==="
        blueprint-compiler --version

        FAILED=0

        # Find every .blp and compile each one individually from its own directory.
        # blueprint-compiler batch-compile requires input-dir == CWD when using
        # bare filenames, so we cd into each file's directory before compiling.
        while IFS= read -r abs_file; do
          dir="$(dirname "$abs_file")"
          base="$(basename "$abs_file")"
          out="/tmp/blp-check/$(echo "$dir" | tr '/' '_')"
          mkdir -p "$out"
          echo "--- $abs_file ---"
          if ! (cd "$dir" && blueprint-compiler batch-compile "$out" . "$base" 2>&1); then
            echo "FAIL: $abs_file"
            FAILED=1
          else
            echo "OK:  $abs_file"
          fi
        done < <(find "$(pwd)" -name '*.blp' -not -path '*/.git/*' | sort)

        if [ "$FAILED" -eq 1 ]; then
          echo ""
          echo "One or more .blp files have errors. Fix them before merging."
          exit 1
        fi

        echo ""
        echo "All .blp files passed blueprint-compiler lint."

    - name: Build with Cargo
      env:
        PKG_CONFIG_PATH: /usr/lib/pkgconfig:/usr/share/pkgconfig
        LD_LIBRARY_PATH: /usr/lib
      run: |
        echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
        echo "Available .pc files:"
        find /usr/lib /usr/share -name "*.pc" 2>/dev/null | grep -E "(gtk|glib|adwaita)" | head -20
        cargo build --release

    - name: Run tests
      run: cargo test
